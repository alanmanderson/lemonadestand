name: Deploy to Azure

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Run backend tests
        run: dotnet test
        working-directory: backend

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Publish backend
        run: dotnet publish LemonadeStand.Api/LemonadeStand.Api.csproj -c Release -o ./publish
        working-directory: backend

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: api-lemonadestand
          package: backend/publish

  deploy-frontend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://api-lemonadestand.azurewebsites.net
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Prepare deployment package
        working-directory: frontend/dist
        run: |
          cat > server.js << 'EOF'
          const http = require('http');
          const fs = require('fs');
          const path = require('path');
          const PORT = process.env.PORT || 8080;
          const MIME_TYPES = {
            '.html': 'text/html', '.js': 'application/javascript', '.css': 'text/css',
            '.json': 'application/json', '.png': 'image/png', '.svg': 'image/svg+xml',
            '.ico': 'image/x-icon', '.woff': 'font/woff', '.woff2': 'font/woff2',
          };
          const server = http.createServer((req, res) => {
            let filePath = path.join(__dirname, req.url === '/' ? 'index.html' : req.url);
            const ext = path.extname(filePath);
            if (!ext || !fs.existsSync(filePath)) filePath = path.join(__dirname, 'index.html');
            const contentType = MIME_TYPES[path.extname(filePath)] || 'application/octet-stream';
            try { const content = fs.readFileSync(filePath); res.writeHead(200, { 'Content-Type': contentType }); res.end(content); }
            catch (e) { res.writeHead(404); res.end('Not found'); }
          });
          server.listen(PORT, () => console.log(`Server running on port ${PORT}`));
          EOF
          cat > package.json << 'EOF'
          {"name":"lemonade-stand-frontend","version":"1.0.0","scripts":{"start":"node server.js"}}
          EOF

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: app-lemonadestand-web
          package: frontend/dist
